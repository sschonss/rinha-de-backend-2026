x-api-common: &api-common
  image: sschonss/rinha-api-2026:v15
  platform: linux/amd64
  volumes:
    - rinha-sockets:/sockets
  deploy:
    resources:
      limits:
        cpus: "0.40"
        memory: "165MB"
  networks:
    - rinha
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

services:
  haproxy:
    image: haproxy:3.3
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - rinha-sockets:/sockets
    depends_on:
      api-1:
        condition: service_healthy
      api-2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"
    networks:
      - rinha

  api-1:
    <<: *api-common
    environment:
      - INDEX_PATH=/data/index.bin
      - LIB_PATH=/app/src/libvector.so
      - FAST_NPROBE=8
      - FULL_NPROBE=24
      - WORKERS=6
      - SOCK_PATH=/sockets/api1.sock
      - WARMUP=500
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 500ms
      timeout: 1s
      start_period: 30s
      retries: 3

  api-2:
    <<: *api-common
    environment:
      - INDEX_PATH=/data/index.bin
      - LIB_PATH=/app/src/libvector.so
      - FAST_NPROBE=8
      - FULL_NPROBE=24
      - WORKERS=6
      - SOCK_PATH=/sockets/api2.sock
      - WARMUP=500
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/ready"]
      interval: 500ms
      timeout: 1s
      start_period: 30s
      retries: 3

volumes:
  rinha-sockets:
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  rinha:
    driver: bridge
