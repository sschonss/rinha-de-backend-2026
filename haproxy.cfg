global
    maxconn 1024

defaults
    mode http
    timeout connect 5s
    timeout client  5s
    timeout server  5s
    option http-keep-alive

frontend http_front
    bind *:9999
    default_backend api_servers

backend api_servers
    balance roundrobin
    option httpchk GET /ready
    http-check expect status 200
    server api1 api:9999 check inter 2s
